# GoReleaser for go-specs (CLI: specs-cli)
# Run on tag push v* or via release workflow on merge to main
version: 2

project_name: go-specs

builds:
  - id: specs-cli
    main: ./cmd/specs-ci
    binary: specs-cli
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - binary
    ids:
      - specs-cli
    name_template: "specs-cli-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
